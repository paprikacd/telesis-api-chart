{{- if .Values.gateway.enabled -}}
{{- if not .Values.gateway.hostnames -}}
{{- fail "gateway.hostnames must contain at least one hostname when gateway.enabled=true" -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "telesis-api.fullname" . }}
  labels:
    {{- include "telesis-api.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - group: {{ default "gateway.networking.k8s.io" .group }}
      kind: {{ default "Gateway" .kind }}
      name: {{ required "gateway.parentRefs[].name is required" .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.path | quote }}
      backendRefs:
        - name: {{ include "telesis-api.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}

