{{- range $name, $component := .Values.components }}
{{- if and $component.enabled $component.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "telesis-api.componentFullname" (dict "root" $ "component" $name "componentValues" $component) }}
  labels:
    {{- include "telesis-api.componentLabels" (dict "root" $ "component" $name "componentValues" $component) | nindent 4 }}
  {{- with $component.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $component.service.type }}
  ports:
    - port: {{ $component.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "telesis-api.componentSelectorLabels" (dict "root" $ "component" $name "componentValues" $component) | nindent 4 }}
{{ end }}
{{ end }}
